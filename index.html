<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drishti | Premium Eyewear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;600&display=swap');
        
        body {
            background: radial-gradient(circle at center, #2c0000 0%, #000000 100%);
            color: #d4af37;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .floating-frame {
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .gold-button {
            background: linear-gradient(45deg, #d4af37, #f2d47e);
            color: #1a0000;
            transition: all 0.3s ease;
        }

        .gold-button:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-5xl w-full glass-card rounded-3xl p-8 md:p-16 flex flex-col md:flex-row items-center gap-12">
        
        <!-- Visual Section -->
        <div class="w-full md:w-1/2 flex justify-center order-2 md:order-1">
            <div class="relative">
                <div class="absolute inset-0 bg-yellow-500 blur-[100px] opacity-20"></div>
                <!-- Placeholder for Premium Frame -->
                <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?auto=format&fit=crop&q=80&w=800" 
                     alt="Premium Frames" 
                     class="floating-frame w-full max-w-sm rounded-lg relative z-10">
            </div>
        </div>

        <!-- Content Section -->
        <div class="w-full md:w-1/2 text-center md:text-left order-1 md:order-2">
            <h2 class="text-sm tracking-[0.3em] uppercase mb-4 opacity-70">Legacy Collection 2026</h2>
            <h1 class="hero-title text-5xl md:text-7xl font-bold mb-6">DRISHTI</h1>
            <p class="text-xl text-gray-300 mb-8 leading-relaxed font-light">
                Redefining the <span class="text-white font-semibold italic">Nazariya</span> of Indian luxury. 
                Handcrafted frames for the visionaries of Pune and beyond.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                <a href="https://wa.me/919669603505?text=I+want+to+see+the+Premium+Collection" 
                   class="gold-button px-10 py-4 rounded-full font-bold text-lg uppercase tracking-wider">
                    Order via Nexa
                </a>
            </div>

            <div class="mt-12 pt-8 border-t border-white/10 flex items-center gap-6 justify-center md:justify-start opacity-50">
                <span class="text-xs tracking-widest">NEXA AGENTIC SOLUTIONS</span>
                <span class="h-1 w-1 bg-yellow-600 rounded-full"></span>
                <span class="text-xs tracking-widest">BANER, PUNE</span>
            </div>
        </div>
    </div>

</body>
</html>
